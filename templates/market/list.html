{% extends 'base.html' %}
{% load static i18n %} 
{% block content %}
<style>
    .big_h { font-size: 2.5rem; }
    .market-filter-bar {
        background-color: white;
        border: 1px solid #eee;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 30px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
    }
    /* Smooth loading state for AJAX */
    #product-grid { transition: opacity 0.3s ease; }
    .is-loading { opacity: 0.5; pointer-events: none; }
    .transition-hover:hover { transform: translateY(-3px); transition: 0.3s; }
</style>

<div class="container py-4">
    <div class="text-center mb-5">
        <h2 class="fw-bold text-dark big_h"><i class="fa-solid fa-shop me-2"></i>{% trans "Global Marketplace" %}</h2>
        <p class="text-muted">{% trans "Browse premium luxury furniture products from verified sellers." %}</p>
    </div>

    <form method="get" class="market-filter-bar" id="ajaxFilterForm">
        <div class="row g-3 align-items-end justify-content-center">
            
            <div class="col-lg-3 col-md-6">
                <label class="form-label fw-bold small text-uppercase">{% trans "Search" %}</label>
                <div class="input-group">
                    <span class="input-group-text bg-white"><i class="fa-solid fa-search text-muted"></i></span>
                    <input type="text" name="q" id="searchInput" class="form-control" placeholder="Arabica, Machine..." value="{{ request.GET.q }}" autocomplete="off">
                </div>
            </div>

            <div class="col-lg-2 col-md-6">
                <label class="form-label fw-bold small text-uppercase">{% trans "Category" %}</label>
                <select name="category" id="categorySelect" class="form-select">
                    <option value="">{% trans "All" %}</option>
                    {% for code, name in categories %}
                        <option value="{{ code }}" {% if request.GET.category == code %}selected{% endif %}>{{ name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-lg-2 col-md-6" id="subCategoryGroup" style="display: none;">
                <label class="form-label fw-bold small text-uppercase">{% trans "Sub Category" %}</label>
                <select name="sub_category" id="subCategorySelect" class="form-select">
                    <option value="">{% trans "All" %}</option>
                    </select>
            </div>

            <div class="col-lg-3 col-md-6">
                <label class="form-label fw-bold small text-uppercase">{% trans "Price Range" %}</label>
                <div class="input-group">
                    <input type="number" name="min_price" id="minPrice" class="form-control" placeholder="Min" value="{{ request.GET.min_price }}">
                    <span class="input-group-text bg-light border-0">-</span>
                    <input type="number" name="max_price" id="maxPrice" class="form-control" placeholder="Max" value="{{ request.GET.max_price }}">
                </div>
            </div>

            <div class="col-lg-2 col-md-12 gap-2">
                <button type="submit" class="btn btn-dark w-100 fw-bold" id="manualFilterBtn">
                    <i class="fa-solid fa-filter me-1"></i> {% trans "Filter" %}
                </button>
                <button type="button" class="btn btn-outline-danger w-100 fw-bold" id="clearFilterBtn" style="margin-top: 0.3rem;">
                    <i class="fa-solid fa-xmark me-1"></i> {% trans "Clear" %}
                </button>
            </div>
        </div>
    </form>
    
    <div id="product-grid">
        {% include 'market/_product_grid.html' %}
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    
    // --- 1. DYNAMIC SUB-CATEGORY CONFIGURATION ---
    const subCategoryDictionary = {
        'Classic': [
            // Note: The 'value' here must match exactly what you type 
            // into the sub_category field in your database/Django Admin.
            { value: 'Sofa Set Models', text: 'Sofa Set Models' },
            { value: 'Dining Room Models', text: 'Dining Room Models' },
            { value: 'Wall and TV Units', text: 'Wall and TV Units' }
        ],
        'Modern': [
            { value: 'Sofa Set Models', text: 'Sofa Set Models' },
            { value: 'Dining Room Models', text: 'Dining Room Models' },
            { value: 'Corner Sofa Models', text: 'Corner Sofa Models' }
        ],
        'Decoration': [
            { value: 'Majlees Models', text: 'Majlees Models' },
            { value: 'Kitchen Decoration', text: 'Kitchen Decoration' }
        ],
        'Office': [
        ],
        'Hotel': [
        ]
    };

    const form = document.getElementById('ajaxFilterForm');
    const categorySelect = document.getElementById('categorySelect');
    const subCategoryGroup = document.getElementById('subCategoryGroup');
    const subCategorySelect = document.getElementById('subCategorySelect');
    const productGrid = document.getElementById('product-grid');
    const clearBtn = document.getElementById('clearFilterBtn');
    
    // Elements that should trigger an active search
    const activeInputs = form.querySelectorAll('input, select');

    // --- 2. SUB-CATEGORY LOGIC ---
    function updateSubCategories() {
        const selectedCategory = categorySelect.value;
        
        // Clear existing sub-categories (except the default "All" option)
        subCategorySelect.innerHTML = '<option value="">All</option>';

        if (selectedCategory && subCategoryDictionary[selectedCategory]) {
            // Show the dropdown and populate it
            subCategoryGroup.style.display = 'block';
            subCategoryDictionary[selectedCategory].forEach(sub => {
                const option = document.createElement('option');
                option.value = sub.value;
                option.textContent = sub.text;
                
                // Keep selected value if it exists in the URL parameters
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('sub_category') === sub.value) {
                    option.selected = true;
                }
                
                subCategorySelect.appendChild(option);
            });
        } else {
            // Hide if no sub-categories exist for this selection
            subCategoryGroup.style.display = 'none';
        }
    }

    // Run on load to set initial state
    updateSubCategories();

    // Run when category changes
    categorySelect.addEventListener('change', function() {
        updateSubCategories();
        fetchProducts(); // Auto-search when category changes
    });


    // --- 3. AJAX ACTIVE SEARCH LOGIC ---
    function fetchProducts() {
        // Add a visual loading state
        productGrid.classList.add('is-loading');

        // Gather form data and build URL
        const formData = new FormData(form);
        const searchParams = new URLSearchParams(formData);
        const url = `${window.location.pathname}?${searchParams.toString()}`;

        // Update the URL in the browser without reloading (so sharing links still works)
        window.history.pushState({}, '', url);

        // Fetch the new HTML from Django
        fetch(url, {
            headers: {
                'X-Requested-With': 'XMLHttpRequest' // Tells Django this is an AJAX call
            }
        })
        .then(response => response.text())
        .then(html => {
            // Swap the old HTML for the new HTML
            productGrid.innerHTML = html;
            // Remove loading state
            productGrid.classList.remove('is-loading');
        })
        .catch(error => {
            console.error("Error fetching products:", error);
            productGrid.classList.remove('is-loading');
        });
    }

    // --- 4. EVENT LISTENERS ---
    
    // Prevent default form submission
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        fetchProducts();
    });

    // Debounce typing (waits 500ms after user stops typing to search)
    let typingTimer;
    document.getElementById('searchInput').addEventListener('input', function() {
        clearTimeout(typingTimer);
        typingTimer = setTimeout(fetchProducts, 500);
    });

    // Price fields trigger search after a slight delay
    document.getElementById('minPrice').addEventListener('input', function() {
        clearTimeout(typingTimer);
        typingTimer = setTimeout(fetchProducts, 800);
    });
    document.getElementById('maxPrice').addEventListener('input', function() {
        clearTimeout(typingTimer);
        typingTimer = setTimeout(fetchProducts, 800);
    });

    // Dropdowns trigger search instantly (Category is handled above)
    subCategorySelect.addEventListener('change', fetchProducts);

    // --- 5. CLEAR BUTTON LOGIC ---
    clearBtn.addEventListener('click', function() {
        // Reset the form
        form.reset();
        
        // Hide sub-categories
        subCategoryGroup.style.display = 'none';
        subCategorySelect.innerHTML = '<option value="">All</option>';

        // Fetch all products (empty query)
        fetchProducts();
    });
});
</script>
{% endblock %}
